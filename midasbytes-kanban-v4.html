<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midas Bytes — Kanban Load Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--sf:#141414;--s2:#191919;--s3:#202020;
  --bd:#242424;--bd2:#2e2e2e;--bd3:#3a3a3a;
  --tx:#f2e8da;--t2:#8a8078;--t3:#504a44;
  --orange:#fd5115;--gold:#fcbc00;--cream:#f2e8da;
  --low:#2eac6c;--med:#fcbc00;--high:#e8433a;
  --info:#3a8bd5;--purple:#8b5cf6;
  --todo:#3a8bd5;--prog:#fd5115;--done:#2eac6c;--block:#e8433a;
  --font:'Bricolage Grotesque',sans-serif;
  --mono:'DM Mono',monospace;
  --dw:34px;--nw:168px;--lw:112px;--rh:62px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(253,81,21,.022) 1px,transparent 1px),
  linear-gradient(90deg,rgba(253,81,21,.022) 1px,transparent 1px);
  background-size:42px 42px;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px;}

/* ── HEADER ── */
header{
  position:relative;z-index:50;flex-shrink:0;
  display:flex;align-items:center;padding:0 20px;height:52px;
  background:#0e0e0e;border-bottom:1px solid var(--bd2);gap:14px;
}
header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--orange),var(--gold) 55%,transparent);}

.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-img{height:23px;width:auto;}
.logo-sep{width:1px;height:18px;background:rgba(253,81,21,.3);}
.logo-tag{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--t3);text-transform:uppercase;}
.logo-tag em{font-style:normal;color:var(--orange);}

.hdr-center{display:flex;align-items:center;gap:10px;margin:0 auto;}
.nav-btn{background:var(--s2);border:1px solid var(--bd2);color:var(--tx);
  width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;}
.nav-btn:hover{background:var(--orange);border-color:var(--orange);}
.month-lbl{font-size:15px;font-weight:700;min-width:178px;text-align:center;color:var(--cream);}

/* stats strip */
.hdr-stats{display:flex;gap:4px;align-items:center;}
.hstat{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:4px;
  background:var(--s2);border:1px solid var(--bd);
  font-size:10px;font-family:var(--mono);color:var(--t2);
  letter-spacing:.04em;
}
.hstat-val{font-weight:500;font-size:12px;color:var(--tx);}
.hstat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn{padding:5px 12px;border-radius:4px;font-family:var(--font);font-size:11px;font-weight:700;
  cursor:pointer;letter-spacing:.05em;border:none;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.btn-or{background:var(--orange);color:#fff;}
.btn-or:hover{background:#e04800;}
.btn-gh{background:transparent;color:var(--t2);border:1px solid var(--bd2);}
.btn-gh:hover{border-color:var(--orange);color:var(--orange);}
.btn-gold{background:rgba(252,188,0,.1);color:var(--gold);border:1px solid rgba(252,188,0,.2);}
.btn-gold:hover{background:rgba(252,188,0,.18);}
.btn-info{background:rgba(58,139,213,.1);color:var(--info);border:1px solid rgba(58,139,213,.2);}
.btn-info:hover{background:rgba(58,139,213,.18);}
.mode-badge{font-size:9px;font-family:var(--mono);letter-spacing:.1em;
  padding:3px 8px;border-radius:3px;text-transform:uppercase;white-space:nowrap;}
.badge-view{background:rgba(255,255,255,.04);color:var(--t3);border:1px solid var(--bd);}
.badge-edit{background:rgba(46,172,108,.1);color:var(--done);border:1px solid rgba(46,172,108,.2);}

/* ── BODY LAYOUT ── */
.app-body{
  position:relative;z-index:5;flex:1;overflow:hidden;
  display:grid;grid-template-columns:1fr 300px;
}

/* ══ CALENDAR PANEL ══ */
.cal-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd);}

/* sticky col headers */
.cal-col-hdr{
  display:flex;flex-shrink:0;
  background:var(--sf);border-bottom:1px solid var(--bd2);
}
.ch-name{width:var(--nw);min-width:var(--nw);padding:9px 14px;
  font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--t3);
  text-transform:uppercase;border-right:1px solid var(--bd);display:flex;align-items:center;}
.ch-load{width:var(--lw);min-width:var(--lw);padding:9px 10px;
  font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--t3);
  text-transform:uppercase;border-right:1px solid var(--bd);display:flex;align-items:center;}
.ch-days{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;scrollbar-width:none;}
.ch-days::-webkit-scrollbar{display:none;}
.dhcol{min-width:var(--dw);width:var(--dw);text-align:center;padding:5px 1px;
  border-right:1px solid var(--bd);flex-shrink:0;position:relative;}
.dhcol .dnum{font-family:var(--mono);font-size:10px;color:var(--t2);line-height:1;}
.dhcol .dname{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.dhcol.wknd{background:rgba(255,255,255,.01);}
.dhcol.today .dnum{
  background:var(--orange);color:#fff;border-radius:50%;
  width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center;}

/* cal body */
.cal-body{flex:1;overflow-y:auto;overflow-x:hidden;}

/* resource row */
.rrow{
  display:flex;min-height:var(--rh);
  border-bottom:1px solid var(--bd);
  border-left:3px solid transparent;
  background:var(--sf);transition:background .12s;
}
.rrow:hover{background:var(--s2);}
.rrow.warn-row{border-left-color:var(--med)!important;}
.rrow.blocked-row{border-left-color:var(--block)!important;}

/* name cell */
.cell-name{
  width:var(--nw);min-width:var(--nw);
  padding:8px 12px;border-right:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;
  position:sticky;left:0;background:inherit;z-index:6;
}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#0d0d0d;}
.r-name{font-size:12px;font-weight:700;color:var(--cream);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.r-role{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:2px;}
.r-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.r-tag{font-size:8px;font-family:var(--mono);padding:1px 5px;border-radius:2px;
  background:var(--s3);color:var(--t3);border:1px solid var(--bd2);}

/* load cell */
.cell-load{
  width:var(--lw);min-width:var(--lw);
  padding:7px 9px;border-right:1px solid var(--bd);
  display:flex;flex-direction:column;justify-content:center;gap:3px;
}
.l-num{font-family:var(--mono);font-size:14px;font-weight:500;line-height:1;}
.l-bar{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;margin:1px 0;}
.l-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.l-sub{font-size:9px;font-family:var(--mono);color:var(--t3);}
.l-warn{font-size:8px;font-family:var(--mono);color:var(--med);letter-spacing:.04em;margin-top:1px;}
.l-block{font-size:8px;font-family:var(--mono);color:var(--block);letter-spacing:.04em;margin-top:1px;}
/* load states */
.s-ok .l-num{color:var(--done);}.s-ok .l-fill{background:var(--done);}
.s-hi .l-num{color:var(--med);}.s-hi .l-fill{background:var(--med);}
.s-ov .l-num{color:var(--orange);}.s-ov .l-fill{background:var(--orange);}
.s-lo .l-num{color:var(--t3);}.s-lo .l-fill{background:var(--t3);}

/* days area */
.cell-days{flex:1;position:relative;overflow:hidden;}
.dgrid{display:flex;height:100%;width:max-content;position:relative;}
.dcell{min-width:var(--dw);width:var(--dw);height:100%;border-right:1px solid var(--bd);
  flex-shrink:0;position:relative;}
.dcell.wknd{background:rgba(255,255,255,.008);}
.overlap-shade{position:absolute;inset:0;background:rgba(252,188,0,.07);pointer-events:none;z-index:1;}
.warn-pip{position:absolute;top:2px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--med);z-index:4;pointer-events:none;}

/* today line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--orange);
  z-index:15;pointer-events:none;box-shadow:0 0 6px rgba(253,81,21,.4);}
.today-line::before{content:'HOY';position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  font-size:7px;font-family:var(--mono);background:var(--orange);color:#fff;
  padding:1px 3px;border-radius:2px;letter-spacing:.07em;white-space:nowrap;}

/* ── TASK BARS ── */
.tbar{
  position:absolute;height:20px;border-radius:3px;z-index:3;cursor:pointer;
  display:flex;align-items:center;padding:0 7px 0 5px;
  font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:filter .12s,transform .1s;
  box-shadow:0 1px 4px rgba(0,0,0,.5);letter-spacing:.01em;gap:4px;
}
.tbar:hover{filter:brightness(1.12);z-index:20;}
.tbar.row1{top:22%;}
.tbar.row2{top:57%;}
.tbar.row3{top:76%;height:16px;font-size:9px;}
/* priority */
.p-low{background:var(--low);color:#0d0d0d;}
.p-med{background:var(--med);color:#0d0d0d;}
.p-high{background:var(--high);color:#fff;}
/* status overlay */
.tbar.st-done{opacity:.55;text-decoration:line-through;}
.tbar.st-blocked::after{content:'🚫';position:absolute;right:3px;font-size:9px;}
.tbar.st-prog::before{content:'';position:absolute;bottom:0;left:0;height:2px;
  background:rgba(255,255,255,.4);animation:prog-pulse 1.5s ease-in-out infinite;border-radius:0 0 2px 2px;}
@keyframes prog-pulse{0%,100%{opacity:.3}50%{opacity:.9}}
/* comment dot */
.c-dot{width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.15);flex-shrink:0;margin-left:auto;}

/* ── STATUS BADGES ── */
.st-badge{display:inline-flex;align-items:center;gap:3px;
  font-size:8px;font-family:var(--mono);padding:1px 5px;border-radius:2px;font-weight:600;letter-spacing:.06em;}
.st-todo{background:rgba(58,139,213,.12);color:var(--todo);}
.st-prog{background:rgba(253,81,21,.12);color:var(--prog);}
.st-done{background:rgba(46,172,108,.1);color:var(--done);}
.st-blocked{background:rgba(232,67,58,.12);color:var(--block);}

/* ══ SIDE PANEL ══ */
.side-panel{background:var(--sf);display:flex;flex-direction:column;overflow:hidden;}

/* tab bar */
.stabs{display:flex;border-bottom:1px solid var(--bd2);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{flex:1;padding:12px 6px;text-align:center;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--t3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.stab.active{color:var(--orange);border-bottom-color:var(--orange);}
.tab-body{flex:1;overflow-y:auto;padding:16px;}
.tpane{display:none;}
.tpane.active{display:block;}

/* form elements */
.flbl{display:block;font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--t2);margin-bottom:5px;}
.finput,.fsel,.ftarea{
  width:100%;padding:8px 10px;background:var(--s2);
  border:1px solid var(--bd2);border-radius:4px;
  font-family:var(--font);font-size:13px;color:var(--tx);outline:none;transition:border-color .15s;}
.finput:focus,.fsel:focus,.ftarea:focus{border-color:var(--orange);}
.fsel option{background:var(--s2);}
.ftarea{min-height:56px;resize:none;line-height:1.45;font-size:12px;}
.fsec{margin-bottom:12px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

/* priority buttons */
.prio-btns{display:flex;gap:5px;}
.pbtn{flex:1;padding:6px 3px;border-radius:4px;border:1.5px solid transparent;
  font-family:var(--font);font-size:10px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;background:var(--s2);color:var(--t2);}
.pbtn.sl{border-color:currentColor;}
.pbtn[data-p="low"].sl{background:rgba(46,172,108,.12);color:var(--low);}
.pbtn[data-p="med"].sl{background:rgba(252,188,0,.12);color:var(--med);}
.pbtn[data-p="high"].sl{background:rgba(232,67,58,.12);color:var(--high);}

/* status buttons */
.status-btns{display:flex;gap:5px;}
.sbtn{flex:1;padding:6px 2px;border-radius:4px;border:1.5px solid transparent;
  font-family:var(--font);font-size:9px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;background:var(--s2);color:var(--t2);}
.sbtn.sl{border-color:currentColor;}
.sbtn[data-s="todo"].sl{background:rgba(58,139,213,.1);color:var(--todo);}
.sbtn[data-s="prog"].sl{background:rgba(253,81,21,.1);color:var(--prog);}
.sbtn[data-s="done"].sl{background:rgba(46,172,108,.1);color:var(--done);}
.sbtn[data-s="blocked"].sl{background:rgba(232,67,58,.1);color:var(--block);}

/* action buttons */
.sub-btn{width:100%;padding:10px;background:var(--orange);color:#fff;border:none;
  border-radius:4px;font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:background .15s;letter-spacing:.03em;}
.sub-btn:hover{background:#e04800;}
.sec-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--bd2);
  border-radius:4px;font-family:var(--font);font-size:11px;font-weight:600;
  color:var(--t2);cursor:pointer;transition:all .15s;margin-top:7px;}
.sec-btn:hover{border-color:var(--orange);color:var(--orange);}

/* section title */
.sec-ttl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--t2);display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sec-ttl::after{content:'';flex:1;height:1px;background:var(--bd);}

/* task list items */
.tli{display:flex;align-items:flex-start;gap:7px;padding:9px 0;border-bottom:1px solid var(--bd);}
.tli:last-child{border-bottom:none;}
.tli-stripe{width:3px;flex-shrink:0;align-self:stretch;border-radius:2px;margin-top:2px;}
.tli-body{flex:1;min-width:0;}
.tli-top{display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap;}
.tli-name{font-size:12px;font-weight:600;color:var(--cream);line-height:1.3;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tli-meta{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:3px;}
.tli-cmnt{font-size:10px;color:var(--t3);margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tli-actions{display:flex;gap:3px;flex-shrink:0;align-items:center;}
.icon-btn{background:none;border:none;color:var(--t3);cursor:pointer;
  font-size:13px;padding:2px 3px;transition:color .15s;border-radius:3px;}
.icon-btn:hover{color:var(--orange);background:rgba(253,81,21,.08);}
.icon-btn.del:hover{color:var(--high);background:rgba(232,67,58,.08);}

/* tiny badge */
.tbadge{display:inline-flex;align-items:center;gap:3px;
  font-size:8px;font-family:var(--mono);padding:1px 5px;
  border-radius:2px;letter-spacing:.05em;font-weight:600;vertical-align:middle;}
.tb-low{background:rgba(46,172,108,.12);color:var(--low);}
.tb-med{background:rgba(252,188,0,.1);color:var(--med);}
.tb-high{background:rgba(232,67,58,.1);color:var(--high);}

/* ── DASHBOARD / KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:10px 12px;
  position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kpi-c,var(--bd3));}
.kpi-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;color:var(--kpi-c,var(--tx));}
.kpi-lbl{font-size:9px;font-family:var(--mono);color:var(--t2);letter-spacing:.07em;text-transform:uppercase;}
.kpi-sub{font-size:9px;color:var(--t3);font-family:var(--mono);margin-top:2px;}

/* velocity / progress bar */
.vel-wrap{margin-bottom:14px;}
.vel-bar-bg{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin:6px 0 4px;}
.vel-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--gold));
  transition:width .6s ease;}
.vel-labels{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--t2);}

/* risk table */
.risk-list{display:flex;flex-direction:column;gap:5px;}
.risk-item{background:var(--s2);border:1px solid var(--bd);border-radius:4px;
  padding:7px 10px;display:flex;align-items:flex-start;gap:8px;}
.risk-icon{font-size:13px;flex-shrink:0;margin-top:1px;}
.risk-body{flex:1;}
.risk-title{font-size:11px;font-weight:600;color:var(--cream);line-height:1.3;}
.risk-meta{font-size:9px;color:var(--t2);font-family:var(--mono);margin-top:2px;}

/* resource summary row */
.rsi{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bd);}
.rsi:last-child{border-bottom:none;}
.rsi-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;color:#0d0d0d;flex-shrink:0;}
.rsi-mid{flex:1;}
.rsi-name{font-size:11px;font-weight:600;color:var(--cream);}
.rsi-role{font-size:9px;color:var(--t2);font-family:var(--mono);}
.rsi-right{text-align:right;}
.rsi-bar{width:54px;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;margin-bottom:2px;}
.rsi-fill{height:100%;border-radius:2px;}
.rsi-pct{font-size:9px;font-family:var(--mono);font-weight:500;}

/* warn panel */
.warn-panel{background:rgba(252,188,0,.05);border:1px solid rgba(252,188,0,.18);
  border-radius:5px;padding:9px 11px;margin-bottom:10px;}
.warn-panel-title{font-size:9px;font-weight:700;color:var(--med);letter-spacing:.08em;margin-bottom:5px;}
.warn-line{font-size:10px;color:var(--t2);font-family:var(--mono);padding:2px 0;
  border-bottom:1px solid rgba(252,188,0,.1);line-height:1.4;}
.warn-line:last-child{border-bottom:none;}

/* locked notice */
.locked{text-align:center;padding:24px 14px;color:var(--t2);font-size:12px;}
.locked .lk-icon{font-size:26px;margin-bottom:8px;}
.unlock-lnk{color:var(--orange);font-weight:700;cursor:pointer;}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
.ov.hidden{display:none;}
.mbox{background:var(--sf);border:1px solid var(--bd2);border-radius:10px;
  padding:26px 22px;width:330px;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.mbox.wide{width:380px;}
.m-title{font-size:15px;font-weight:800;color:var(--cream);margin-bottom:4px;}
.m-sub{font-size:11px;color:var(--t2);margin-bottom:16px;line-height:1.5;}
.m-prio-line{height:3px;border-radius:2px;margin-bottom:14px;}
.m-inp{width:100%;padding:9px 11px;margin-bottom:10px;background:var(--s2);
  border:1px solid var(--bd2);border-radius:5px;font-family:var(--font);
  font-size:13px;color:var(--tx);outline:none;transition:border-color .15s;}
.m-inp:focus{border-color:var(--orange);}
.m-btn{width:100%;padding:10px;background:var(--orange);color:#fff;border:none;
  border-radius:5px;font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:background .15s;}
.m-btn:hover{background:#e04800;}
.m-err{font-size:10px;color:var(--high);margin-top:6px;text-align:center;min-height:14px;}
.m-cancel{display:block;text-align:center;margin-top:9px;font-size:11px;
  color:var(--t2);cursor:pointer;text-decoration:underline;}
.m-char{font-size:9px;font-family:var(--mono);color:var(--t3);text-align:right;margin-top:3px;}
.m-actions{display:flex;gap:8px;margin-top:12px;}
.m-sec{padding:9px 14px;background:transparent;border:1px solid var(--bd2);
  border-radius:5px;color:var(--t2);font-family:var(--font);font-size:12px;cursor:pointer;
  transition:all .15s;}
.m-sec:hover{border-color:var(--t2);color:var(--tx);}
.m-textarea{width:100%;min-height:80px;padding:9px 11px;background:var(--s2);
  border:1px solid var(--bd2);border-radius:5px;font-family:var(--font);font-size:13px;
  color:var(--tx);outline:none;resize:vertical;line-height:1.5;transition:border-color .15s;}
.m-textarea:focus{border-color:var(--orange);}

/* ── RICH TOOLTIP ── */
.rtip{
  position:fixed;z-index:9999;width:270px;
  background:var(--s2);border:1px solid var(--bd3);border-radius:8px;
  box-shadow:0 10px 40px rgba(0,0,0,.8),0 0 0 1px rgba(253,81,21,.06);
  pointer-events:none;overflow:hidden;
  opacity:0;transform:translateY(8px) scale(.97);
  transition:opacity .16s ease,transform .16s ease;
}
.rtip.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.rt-stripe{height:3px;width:100%;}
.rt-head{padding:10px 12px 8px;}
.rt-name{font-size:13px;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:6px;}
.rt-chips{display:flex;gap:5px;flex-wrap:wrap;}
.rtchip{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:3px;letter-spacing:.05em;}
.rtc-prio-low{background:rgba(46,172,108,.12);color:var(--low);}
.rtc-prio-med{background:rgba(252,188,0,.1);color:var(--med);}
.rtc-prio-high{background:rgba(232,67,58,.1);color:var(--high);}
.rtc-date{background:rgba(255,255,255,.05);color:var(--t2);}
.rtc-days{background:rgba(253,81,21,.1);color:var(--orange);}
.rtc-done{background:rgba(46,172,108,.1);color:var(--done);}
.rtc-prog{background:rgba(253,81,21,.1);color:var(--prog);}
.rtc-todo{background:rgba(58,139,213,.1);color:var(--todo);}
.rtc-blocked{background:rgba(232,67,58,.1);color:var(--block);}
.rt-body{padding:8px 12px;border-top:1px solid var(--bd);}
.rt-cmnt-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.rt-cmnt-lbl::after{content:'';flex:1;height:1px;background:var(--bd);}
.rt-cmnt-txt{font-size:11px;color:var(--t2);line-height:1.55;}
.rt-no-cmnt{font-size:10px;color:var(--t3);font-family:var(--mono);font-style:italic;}
.rt-foot{padding:7px 12px;border-top:1px solid var(--bd);display:flex;gap:5px;justify-content:flex-end;}
.rt-fbtn{font-size:9px;font-family:var(--font);font-weight:700;padding:4px 9px;
  border-radius:3px;cursor:pointer;border:1px solid var(--bd3);
  background:var(--s3);color:var(--t2);transition:all .15s;letter-spacing:.04em;}
.rt-fbtn:hover{border-color:var(--orange);color:var(--orange);}
.rt-fbtn.del{color:var(--high);border-color:rgba(232,67,58,.2);}
.rt-fbtn.del:hover{background:rgba(232,67,58,.1);}

/* ── STATUS CHANGE INLINE ── */
.st-inline{display:flex;gap:3px;margin-top:5px;}
.si-btn{padding:3px 7px;border-radius:3px;font-size:8px;font-family:var(--mono);
  font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .12s;background:var(--s3);}
.si-btn.active-todo{background:rgba(58,139,213,.12);color:var(--todo);border-color:var(--todo);}
.si-btn.active-prog{background:rgba(253,81,21,.12);color:var(--prog);border-color:var(--prog);}
.si-btn.active-done{background:rgba(46,172,108,.1);color:var(--done);border-color:var(--done);}
.si-btn.active-blocked{background:rgba(232,67,58,.1);color:var(--block);border-color:var(--block);}
.si-btn:not([class*="active"]){color:var(--t3);}
.si-btn:not([class*="active"]):hover{color:var(--t2);border-color:var(--bd3);}

/* footer bar */
.footer-strip{position:fixed;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--orange) 0%,var(--gold) 100%);z-index:100;}

/* done row faded */
.rrow.all-done{opacity:.6;}
</style>
</head>
<body>

<!-- ════ MODALS ════ -->
<!-- Password -->
<div class="ov hidden" id="pwOv">
  <div class="mbox">
    <div class="m-title">🔒 Modo edición</div>
    <div class="m-sub">Contraseña para agregar, editar o eliminar tareas y recursos.</div>
    <input class="m-inp" type="password" id="pwInp" placeholder="Contraseña...">
    <button class="m-btn" id="pwOk">Entrar</button>
    <div class="m-err" id="pwErr"></div>
    <span class="m-cancel" id="pwCancel">Cancelar</span>
  </div>
</div>

<!-- Comment -->
<div class="ov hidden" id="cmntOv">
  <div class="mbox">
    <div class="m-title" id="cmntTitle">Comentario</div>
    <div class="m-sub" id="cmntSub"></div>
    <div class="m-prio-line" id="cmntPrioLine"></div>
    <textarea class="m-textarea" id="cmntTa" placeholder="Escribe notas, contexto, riesgos, dependencias..." maxlength="500"></textarea>
    <div class="m-char"><span id="cmntCc">0</span>/500</div>
    <div class="m-actions">
      <button class="m-sec" id="cmntCancel" style="flex:1">Cancelar</button>
      <button class="m-btn" id="cmntSave" style="flex:2">Guardar</button>
    </div>
  </div>
</div>

<!-- Edit Task -->
<div class="ov hidden" id="editOv">
  <div class="mbox wide">
    <div class="m-title">✏️ Editar tarea</div>
    <div class="m-sub" id="editSub"></div>
    <div class="fsec">
      <label class="flbl">Nombre</label>
      <input class="finput m-inp" id="eN" type="text" style="margin-bottom:0">
    </div>
    <div style="height:10px"></div>
    <div class="fsec">
      <div class="frow2">
        <div><label class="flbl">Inicio</label><input class="finput m-inp" id="eS" type="date" style="margin-bottom:0"></div>
        <div><label class="flbl">Fin</label><input class="finput m-inp" id="eE" type="date" style="margin-bottom:0"></div>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="fsec">
      <label class="flbl">Prioridad</label>
      <div class="prio-btns" id="ePrioBtns">
        <button class="pbtn" data-p="low">🟢 Baja</button>
        <button class="pbtn" data-p="med">🟡 Media</button>
        <button class="pbtn" data-p="high">🔴 Alta</button>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="fsec">
      <label class="flbl">Estado</label>
      <div class="status-btns" id="eStatBtns">
        <button class="sbtn" data-s="todo">📋 TO DO</button>
        <button class="sbtn" data-s="prog">⚡ EN CURSO</button>
        <button class="sbtn" data-s="done">✅ DONE</button>
        <button class="sbtn" data-s="blocked">🚫 BLOCKED</button>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="m-actions">
      <button class="m-sec" id="editCancel" style="flex:1">Cancelar</button>
      <button class="m-btn" id="editSave" style="flex:2">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- Rich Tooltip -->
<div class="rtip" id="rtip">
  <div class="rt-stripe" id="rtStripe"></div>
  <div class="rt-head">
    <div class="rt-name" id="rtName"></div>
    <div class="rt-chips" id="rtChips"></div>
    <div class="st-inline" id="rtStatInline"></div>
  </div>
  <div class="rt-body" id="rtBody"></div>
  <div class="rt-foot" id="rtFoot" style="display:none">
    <button class="rt-fbtn" id="rtEdit">✏️ Editar</button>
    <button class="rt-fbtn" id="rtCmnt">💬 Comentario</button>
    <button class="rt-fbtn del" id="rtDel">✕</button>
  </div>
</div>

  return n;
};
const loadSt = (d,a) => { const p=d/a; if(p>1)return'ov'; if(p>=0.8)return'hi'; if(p>=0.25)return'ok'; return'lo'; };

function resLoad(rid) {
  const y=CY,m=CM,ms=new Date(y,m,1),me=new Date(y,m+1,0);
  let tot=0;
  tasks.filter(t=>t.rid===rid&&t.stat!=='done').forEach(t=>{
    const s=parseDt(t.start),e=parseDt(t.end),es=s<ms?ms:s,ee=e>me?me:e;
    if(es>ee)return;
    let cur=new Date(es);
    while(cur<=ee){if(cur.getDay()!==0&&cur.getDay()!==6)tot++;cur.setDate(cur.getDate()+1);}
  });
  return tot;
}

function getOverlapDays(rid) {
  const y=CY,m=CM,rt=tasks.filter(t=>t.rid===rid&&t.stat!=='done'),set=new Set();
  if(rt.length<2)return set;
  for(let d=1;d<=dim(y,m);d++){
    if(isWknd(y,m,d))continue;
    const dt=new Date(y,m,d);
    const act=rt.filter(t=>{const s=parseDt(t.start),e=parseDt(t.end);return dt>=s&&dt<=e;});
    if(act.length>=2)set.add(d);
  }
  return set;
}

function getWarnings() {
  const w=[];
  resources.forEach(r=>{
    const od=getOverlapDays(r.id);
    if(od.size>0) w.push({rid:r.id,rname:r.name,days:od.size});
  });
  return w;
}

function getBlocked() {
  return tasks.filter(t=>t.stat==='blocked');
}

        <div class="r-role">${res.role}</div>
        <div class="r-tags">${skillTags}</div>
      </div>`;

    // load
    const lc=document.createElement('div'); lc.className=`cell-load s-${st}`;

    // days

    for(let d=1;d<=total;d++){

        const pip=document.createElement('div'); pip.className='warn-pip'; cell.appendChild(pip);
      }
      grid.appendChild(cell);
    }

    // today line
    if(y===now.getFullYear()&&m===now.getMonth()){
      const tl=document.createElement('div'); tl.className='today-line';
      tl.style.left=((now.getDate()-1)*34)+'px'; grid.appendChild(tl);
    }

    // task bars — assign rows smartly
    const DAY_W=34;
    const rowAssign = assignRows(resTasks, y, m);

    resTasks.forEach(task=>{
      const ts=parseDt(task.start),te=parseDt(task.end);
      const ms2=new Date(y,m,1),me2=new Date(y,m+1,0);
      const es=ts<ms2?ms2:ts,ee=te>me2?me2:te;
      if(es>me2||ee<ms2)return;
      const sd=es.getDate(),ed=ee.getDate();
      const left=(sd-1)*DAY_W, width=(ed-sd+1)*DAY_W-2;
      const rowNum=rowAssign[task.id]||1;

      const bar=document.createElement('div');
      bar.className=`tbar row${rowNum} p-${task.prio} st-${task.stat}`;
      bar.style.cssText=`left:${left}px;width:${width}px`;

      grid.appendChild(bar);
    });

    dc.appendChild(grid); row.appendChild(nc); row.appendChild(lc); row.appendChild(dc);
    body.appendChild(row);
  });
  syncScroll();
}

// smart row assignment — avoid overlap
function assignRows(resTasks, y, m) {
  const assign={};
  const slots=[[],[],[]]; // 3 slots
  const total=dim(y,m);

  resTasks.forEach(task=>{
    const ts=parseDt(task.start),te=parseDt(task.end);
    const ms2=new Date(y,m,1),me2=new Date(y,m+1,0);
    const es=ts<ms2?ms2:ts,ee=te>me2?me2:te;
    if(es>me2||ee<ms2){assign[task.id]=1;return;}
    const sd=es.getDate(),ed=ee.getDate();

    for(let row=0;row<3;row++){
      const clash=slots[row].some(r=>!(ed<r.sd||sd>r.ed));
      if(!clash){
        slots[row].push({sd,ed});
        assign[task.id]=row+1;
        return;
      }
    }
    assign[task.id]=3; // fallback
  });
  return assign;
}

function syncScroll(){
  const rows=document.querySelectorAll('.cell-days');
  const hs=document.getElementById('chDays');
  rows.forEach(cell=>{
    cell.style.cssText='flex:1;position:relative;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;';
    cell.addEventListener('scroll',()=>{ hs.scrollLeft=cell.scrollLeft; rows.forEach(o=>{if(o!==cell)o.scrollLeft=cell.scrollLeft;}); });
  });
  hs.addEventListener('scroll',()=>rows.forEach(c=>c.scrollLeft=hs.scrollLeft));
}

  const wd=taskWD(task);

  ).join('');
  si.querySelectorAll('.si-btn').forEach(b=>{

  }
  const foot=document.getElementById('rtFoot');

    document.getElementById('rtEdit').onclick=()=>{ hideTip(true); openEditModal(task.id); };
    document.getElementById('rtCmnt').onclick=()=>{ hideTip(true); openCmnt(task.id); };
    document.getElementById('rtDel').onclick=()=>{ hideTip(true); if(confirm(`¿Eliminar "${task.name}"?`)){ tasks=tasks.filter(t=>t.id!==task.id); saveState(); render(); } };
  } else foot.style.display='none';
}
function posTip(e){
  const tw=270,th=220;
  let x=e.clientX+16,y=e.clientY-20;
  if(x+tw>window.innerWidth-8) x=e.clientX-tw-10;
  if(y+th>window.innerHeight-8) y=window.innerHeight-th-8;
  if(y<8) y=8;
  tipEl.style.left=x+'px'; tipEl.style.top=y+'px';
}
function hideTip(imm){
  clearTimeout(tipShowTimer);
  if(imm){tipEl.classList.remove('show');return;}
  tipHideTimer=setTimeout(()=>tipEl.classList.remove('show'),180);
}
tipEl.addEventListener('mouseenter',()=>clearTimeout(tipHideTimer));
tipEl.addEventListener('mouseleave',()=>hideTip());

window.openEditModal = id => {
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editingTask=id; editPrio=t.prio; editStat=t.stat;
  const r=resources.find(x=>x.id===t.rid);
  document.getElementById('editSub').textContent=(r?r.name:'—')+' · '+t.start+' → '+t.end;
  document.getElementById('eN').value=t.name;
  document.getElementById('eS').value=t.start;
  document.getElementById('eE').value=t.end;
  // prio buttons
  document.querySelectorAll('#ePrioBtns .pbtn').forEach(b=>{
    b.className='pbtn'+(b.dataset.p===t.prio?' sl':'');
  });
  // stat buttons
  document.querySelectorAll('#eStatBtns .sbtn').forEach(b=>{
    b.className='sbtn'+(b.dataset.s===t.stat?' sl':'');
  });
  document.getElementById('editOv').classList.remove('hidden');
};
document.querySelectorAll('#ePrioBtns .pbtn').forEach(b=>{

});
document.querySelectorAll('#eStatBtns .sbtn').forEach(b=>{

    document.querySelectorAll('#eStatBtns .sbtn').forEach(x=>x.className='sbtn');
    b.classList.add('sl'); editStat=b.dataset.s;
  });
});
document.getElementById('editSave').addEventListener('click',()=>{
  const t=tasks.find(x=>x.id===editingTask); if(!t) return;
  const nm=document.getElementById('eN').value.trim();
  const st=document.getElementById('eS').value, en=document.getElementById('eE').value;
  if(!nm||!st||!en){ alert('Completa nombre y fechas'); return; }
  if(st>en){ alert('Inicio debe ser antes que fin'); return; }
  t.name=nm; t.start=st; t.end=en; t.prio=editPrio; t.stat=editStat;
  saveState(); render();
  document.getElementById('editOv').classList.add('hidden');
});
document.getElementById('editCancel').addEventListener('click',()=>document.getElementById('editOv').classList.add('hidden'));

document.getElementById('addTaskBtn').addEventListener('click',()=>{
  const rid=parseInt(document.getElementById('fRes').value);
  const name=document.getElementById('fNm').value.trim();
  const st=document.getElementById('fSt').value, en=document.getElementById('fEn').value;

  document.getElementById('fNm').value='';

  saveState(); render();

  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));

  document.querySelector('[data-tab="tasks"]').classList.add('active');

});

function addRes(){
  const name=prompt('Nombre del recurso:'); if(!name||!name.trim()) return;
  const role=prompt('Rol (ej: Frontend Dev):')||'Equipo';
  const skillsRaw=prompt('Skills separados por coma (opcional):')||'';
  const skills=skillsRaw.split(',').map(s=>s.trim()).filter(Boolean).slice(0,3);
  const initials=name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const palette=['#fd5115','#fcbc00','#2eac6c','#3a8bd5','#8b5cf6','#e84393','#f2e8da'];
  resources.push({id:resId++,name:name.trim(),role,color:palette[resId%palette.length],initials,skills});
  saveState(); render();
}
document.getElementById('addResBtn').addEventListener('click',addRes);
document.getElementById('addResSub').addEventListener('click',addRes);
window.delTask=id=>{ tasks=tasks.filter(t=>t.id!==id); saveState(); render(); };

//  PDF EXPORT
// ══════════════════════════════════════════════
document.getElementById('pdfBtn').addEventListener('click', exportPDF);

function exportPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'});
  const W=841.89,H=595.28;
  const C={
    bg:[13,13,13],sf:[20,20,20],s2:[26,26,26],
    or:[253,81,21],gold:[252,188,0],cream:[242,232,218],
    t2:[138,128,120],t3:[80,74,68],bd:[36,36,36],
    green:[46,172,108],red:[232,67,58],blue:[58,139,213],
    low:[46,172,108],med:[252,188,0],high:[232,67,58],
  };
  const h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const avail=wdInMonth(CY,CM),total=dim(CY,CM);
  const warns=getWarnings(),blocked=getBlocked();
  const doneC=tasks.filter(t=>t.stat==='done').length;
  const pct=tasks.length?Math.round(doneC/tasks.length*100):0;

  // background
  doc.setFillColor(...C.bg); doc.rect(0,0,W,H,'F');

  // header bar
  doc.setFillColor(...C.sf); doc.rect(0,0,W,52,'F');
  doc.setFillColor(...C.or); doc.rect(0,50,W*0.55,2,'F');
  doc.setFillColor(...C.gold); doc.rect(W*0.55,50,W*0.45,2,'F');

  // logo
  try{ doc.addImage(document.querySelector('.logo-img').src,'PNG',18,13,72,24); }catch(e){}
  doc.setDrawColor(...C.or); doc.setLineWidth(0.5);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...C.t3);
  doc.text('KANBANLOAD / MONITOR',100,28);

  // month
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(...C.cream);
  doc.text(MONTHS[CM].toUpperCase()+' '+CY,W/2,32,{align:'center'});

  // stats strip
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...C.t2);
  doc.text(`${tasks.length} tareas  ·  ${doneC} done (${pct}%)  ·  ${blocked.length} bloqueadas  ·  ${resources.length} recursos`,W-18,28,{align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(6.5);
  doc.text(`Generado: ${new Date().toLocaleDateString('es-CL')}`,W-18,38,{align:'right'});

  // legend
  const LY=65;
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.t2);
  doc.text('PRIORIDAD:',18,LY);
  [[C.low,'BAJA'],[C.med,'MEDIA'],[C.high,'ALTA']].forEach(([c,l],i)=>{
    const x=70+i*52; doc.setFillColor(...c); doc.roundedRect(x,LY-7,7,7,1.5,1.5,'F');
    doc.setTextColor(...C.cream); doc.text(l,x+9,LY);
  });
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...C.t2);
  doc.text('ESTADO:',230,LY);
  [[C.blue,'TO DO'],[C.or,'EN CURSO'],[C.green,'DONE'],[C.red,'BLOCKED']].forEach(([c,l],i)=>{
    const x=265+i*62; doc.setFillColor(...c); doc.circle(x+3,LY-3,3,'F');
    doc.setTextColor(...C.cream); doc.text(l,x+8,LY);
  });
  // comment dot legend
  doc.setFillColor(255,255,255); doc.circle(525,LY-3,2.5,'F');
  doc.setTextColor(...C.t2); doc.text('= comentario',531,LY);

  // progress bar
  const PBAR_Y=76;
  doc.setFillColor(36,36,36); doc.roundedRect(18,PBAR_Y,W-36,5,2,2,'F');
  if(pct>0){
    doc.setFillColor(...C.or);
    doc.roundedRect(18,PBAR_Y,(W-36)*(pct/100),5,2,2,'F');
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(...C.or);
  doc.text(`${pct}% completado`,W/2,PBAR_Y+10,{align:'center'});

  // calendar grid
  const HEADER_H=90,LEFT_W=122,LOAD_W=70;
  const DAY_W=(W-LEFT_W-LOAD_W-24)/total;
  const ROW_H=(H-HEADER_H-20)/resources.length;
  const GX=12,GY=HEADER_H;

  // column headers
  doc.setFillColor(...C.sf); doc.rect(GX,GY,LEFT_W+LOAD_W,16,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(5.5); doc.setTextColor(...C.t3);
  doc.text('RECURSO',GX+8,GY+10); doc.text('CARGA',GX+LEFT_W+8,GY+10);

  for(let d=1;d<=total;d++){
    const x=GX+LEFT_W+LOAD_W+(d-1)*DAY_W;
    const wk=isWknd(CY,CM,d),tod=isToday(CY,CM,d);
    if(wk){doc.setFillColor(18,18,18);doc.rect(x,GY,DAY_W,16,'F');}
    if(tod){doc.setFillColor(...C.or);doc.circle(x+DAY_W/2,GY+7,5,'F');doc.setTextColor(255,255,255);}
    else{doc.setTextColor(...C.t2);}
    doc.setFont('helvetica','normal');doc.setFontSize(5.5);
    doc.text(String(d),x+DAY_W/2,GY+9,{align:'center'});
    doc.setTextColor(...C.t3);doc.setFontSize(4.5);
    doc.text(DAYS[new Date(CY,CM,d).getDay()],x+DAY_W/2,GY+15,{align:'center'});
  }

  // rows
  resources.forEach((res,ri)=>{
    const ry=GY+16+ri*ROW_H;
    const load=resLoad(res.id),p=Math.round(load/avail*100),st=loadSt(load,avail);
    const hw=warns.some(w=>w.rid===res.id);
    const hb=tasks.some(t=>t.rid===res.id&&t.stat==='blocked');
    const rc=h2r(res.color);
    const ol=getOverlapDays(res.id);

    doc.setFillColor(...C.sf); doc.rect(GX,ry,W-GX*2,ROW_H,'F');
    doc.setFillColor(...(hb?C.red:hw?C.med:rc)); doc.rect(GX,ry,2.5,ROW_H,'F');
    doc.setDrawColor(...C.bd);doc.setLineWidth(0.25);doc.line(GX,ry+ROW_H,W-GX,ry+ROW_H);

    // avatar
    doc.setFillColor(...rc); doc.circle(GX+13,ry+ROW_H/2,8,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(13,13,13);
    doc.text(res.initials,GX+13,ry+ROW_H/2+1.8,{align:'center'});

    // name + role
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...C.cream);
    doc.text(res.name,GX+26,ry+ROW_H/2-2);
    doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(...C.t2);
    doc.text(res.role,GX+26,ry+ROW_H/2+5);
    // skills
    if(res.skills&&res.skills.length){
      doc.setFontSize(4.5);doc.setTextColor(...C.t3);
      doc.text(res.skills.join(' · '),GX+26,ry+ROW_H/2+11);
    }

    // load col
    const lx=GX+LEFT_W+4,ly=ry+ROW_H/2;
    const stC=st==='ov'?C.or:st==='hi'?C.med:st==='ok'?C.green:[74,69,64];
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...stC);
    doc.text(`${load}d`,lx,ly+2);
    doc.setFillColor(36,36,36);doc.roundedRect(lx,ly+4,48,2.5,1,1,'F');
    doc.setFillColor(...stC);doc.roundedRect(lx,ly+4,48*Math.min(p/100,1),2.5,1,1,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(5.5);doc.setTextColor(...C.t2);
    doc.text(`${p}%`,lx,ly+12);
    if(hb){doc.setTextColor(...C.red);doc.setFontSize(5);doc.text('🚫 BLOCKED',lx,ly+18);}
    else if(hw){doc.setTextColor(...C.med);doc.setFontSize(5);doc.text('⚠ SOLAPAMIENTO',lx,ly+18);}

    // weekend shade + overlap
    for(let d=1;d<=total;d++){
      const dx=GX+LEFT_W+LOAD_W+(d-1)*DAY_W;
      if(isWknd(CY,CM,d)){doc.setFillColor(16,16,16);doc.rect(dx,ry,DAY_W,ROW_H,'F');}
      if(ol.has(d)){
        doc.setFillColor(...C.med);
        try{doc.setGState(new doc.GState({opacity:.15}));}catch(e){}
        doc.rect(dx,ry,DAY_W,ROW_H,'F');
        try{doc.setGState(new doc.GState({opacity:1}));}catch(e){}
      }
    }

    // task bars
    const barH=Math.min(ROW_H*0.3,10);
    const rowA=assignRows(tasks.filter(t=>t.rid===res.id),CY,CM);
    tasks.filter(t=>t.rid===res.id).forEach(task=>{
      const ts=parseDt(task.start),te=parseDt(task.end);
      const ms2=new Date(CY,CM,1),me2=new Date(CY,CM+1,0);
      const es=ts<ms2?ms2:ts,ee=te>me2?me2:te;
      if(es>me2||ee<ms2)return;
      const sd=es.getDate(),ed=ee.getDate();
      const bx=GX+LEFT_W+LOAD_W+(sd-1)*DAY_W,bw=(ed-sd+1)*DAY_W-1;
      const rowNum=rowA[task.id]||1;
      const rowOffsets=[.15,.5,.75];
      const by=ry+ROW_H*rowOffsets[rowNum-1];
      const pc2=h2r(PC[task.prio]);

      // done = faded
      if(task.stat==='done'){ try{doc.setGState(new doc.GState({opacity:.45}));}catch(e){} }

      doc.setFillColor(...pc2); doc.roundedRect(bx,by,bw,barH,1.5,1.5,'F');

      // status dot
      const stDotC=task.stat==='todo'?C.blue:task.stat==='prog'?C.or:task.stat==='done'?C.green:C.red;
      doc.setFillColor(...stDotC); doc.circle(bx+3,by+barH/2,2,'F');

      if(bw>16){
        doc.setFont('helvetica','bold');doc.setFontSize(5);
        doc.setTextColor(task.prio==='high'?255:16,16,16);
        const maxChars=Math.floor(bw/3.2);
        const lbl=task.name.length>maxChars?task.name.slice(0,maxChars-1)+'…':task.name;
        doc.text(lbl,bx+7,by+barH*.72);
      }
      if(task.comment&&task.comment.trim()){
        doc.setFillColor(255,255,255); doc.circle(bx+bw-3,by+2,1.5,'F');
      }
      if(task.stat==='done'){ try{doc.setGState(new doc.GState({opacity:1}));}catch(e){} }
    });

    // today line
    if(CY===now.getFullYear()&&CM===now.getMonth()){
      const tx=GX+LEFT_W+LOAD_W+(now.getDate()-.5)*DAY_W;
      doc.setDrawColor(...C.or);doc.setLineWidth(1);doc.line(tx,ry,tx,ry+ROW_H);
    }
  });

  // footer
  doc.setFillColor(...C.or);doc.rect(0,H-3,W*.55,3,'F');
  doc.setFillColor(...C.gold);doc.rect(W*.55,H-3,W*.45,3,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(...C.t2);
  doc.text('MIDAS BYTES — Kanban Load Monitor',18,H-7);
  doc.text(`${MONTHS[CM]} ${CY}  ·  ${resources.length} recursos  ·  ${tasks.length} tareas  ·  ${pct}% completado`,W-18,H-7,{align:'right'});

  doc.save(`KanbanLoad_${MONTHS[CM]}_${CY}.pdf`);
}
