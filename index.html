<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midas Bytes - Monitor de Cargas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
:root{
  --bg:#0d0d0d;--sf:#141414;--s2:#191919;--s3:#202020;
  --bd:#242424;--bd2:#2e2e2e;--bd3:#3a3a3a;
  --tx:#f2e8da;--t2:#8a8078;--t3:#504a44;
  --orange:#fd5115;--gold:#fcbc00;--cream:#f2e8da;
  --low:#2eac6c;--med:#fcbc00;--high:#e8433a;
  --todo:#3a8bd5;--prog:#fd5115;--done:#2eac6c;--block:#e8433a;
  --font:'Bricolage Grotesque',sans-serif;--mono:'DM Mono',monospace;
  --DW:34px;--NW:220px;--LW:110px;--RH:64px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(253,81,21,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(253,81,21,.02) 1px,transparent 1px);
  background-size:42px 42px;}
header{position:relative;z-index:20;display:flex;align-items:center;gap:12px;height:60px;padding:0 18px;background:#0e0e0e;border-bottom:1px solid var(--bd2)}
header::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:2px;background:linear-gradient(90deg,var(--orange),var(--gold) 55%,transparent)}
.logo{display:flex;align-items:center;gap:10px;min-width:140px}
.logo-mark{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;color:#111;font-weight:800}
.logo-tag{font-size:10px;font-family:var(--mono);letter-spacing:.16em;color:var(--t3)}
.hdr-mid{display:flex;align-items:center;gap:8px;margin:0 auto}
.month-lbl{font-size:18px;font-weight:800;min-width:180px;text-align:center}
.nav-btn,.btn,.icon-btn{background:var(--s2);color:var(--tx);border:1px solid var(--bd2);border-radius:6px;cursor:pointer}
.nav-btn{width:30px;height:30px}
.btn{padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.btn:hover,.nav-btn:hover,.icon-btn:hover{border-color:var(--orange)}
.btn-or{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-gold{color:var(--gold);background:rgba(252,188,0,.1);border-color:rgba(252,188,0,.25)}
.btn-cyan{color:#6fe8ff;background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.25)}
.btn-gh{color:var(--t2)}
.top-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fsel,.finput,.fta{width:100%;background:var(--s2);border:1px solid var(--bd2);color:var(--tx);border-radius:6px;padding:8px 10px;font-size:12px;font-family:var(--font)}
.fsel:focus,.finput:focus,.fta:focus{outline:none;border-color:var(--orange)}
.app{position:relative;z-index:5;flex:1;display:flex;min-height:0}
.monitor-view{flex:1;display:grid;grid-template-columns:1fr 320px;min-height:0}
.cal-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd)}
.cal-head{display:flex;background:var(--sf);border-bottom:1px solid var(--bd2);flex-shrink:0}
.ch-name{width:var(--NW);min-width:var(--NW);padding:10px 12px;border-right:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--t3);text-transform:uppercase}
.ch-load{width:var(--LW);min-width:var(--LW);padding:10px 10px;border-right:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--t3);text-transform:uppercase}
.days-wrap{flex:1;overflow:auto}
.days-row{display:flex;min-width:max-content}
.dh{width:var(--DW);min-width:var(--DW);padding:4px 0;border-right:1px solid var(--bd);text-align:center;position:relative}
.dh .dn{font-family:var(--mono);font-size:10px;color:var(--t2)}
.dh .dw{font-size:7px;color:var(--t3);text-transform:uppercase}
.dh.weekend{background:rgba(255,255,255,.012)}
.dh.today .dn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--orange);color:#fff}
.cal-body{flex:1;overflow:auto}
.rrow{display:flex;min-height:var(--RH);border-bottom:1px solid var(--bd);background:var(--sf)}
.rrow:hover{background:var(--s2)}
.rname{width:var(--NW);min-width:var(--NW);padding:8px 12px;border-right:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#111;flex-shrink:0}
.rn{font-size:12px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr{font-size:9px;color:var(--t2);font-family:var(--mono)}
.rload{width:var(--LW);min-width:var(--LW);padding:8px 10px;border-right:1px solid var(--bd)}
.ln{font-family:var(--mono);font-size:12px;font-weight:700}
.lbar{height:4px;background:var(--bd2);border-radius:2px;overflow:hidden;margin:4px 0}
.lfill{height:100%}
.lsub{font-size:9px;font-family:var(--mono);color:var(--t2)}
.rdays{flex:1;position:relative;overflow:hidden}
.dgrid{display:flex;height:100%;width:max-content}
.dcell{width:var(--DW);min-width:var(--DW);border-right:1px solid var(--bd);position:relative}
.dcell.weekend{background:rgba(255,255,255,.008)}
.daybar{position:absolute;bottom:0;left:2px;right:2px;height:4px;border-radius:2px 2px 0 0;background:rgba(46,172,108,.9)}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--orange);z-index:6;pointer-events:none}
.tbar{position:absolute;height:19px;border-radius:4px;padding:0 6px;display:flex;align-items:center;gap:5px;box-shadow:0 2px 10px rgba(0,0,0,.4);font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbar.r1{top:11px}.tbar.r2{top:34px}.tbar.r3{top:49px;height:13px;font-size:8px}
.sidebar{background:var(--sf);display:flex;flex-direction:column;min-height:0}
.tabs{display:flex;border-bottom:1px solid var(--bd2)}
.tab{flex:1;text-align:center;padding:11px 4px;font-size:8px;font-weight:700;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-pane{display:none;padding:14px;overflow:auto}
.tab-pane.active{display:block}
.flbl{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.fsec{margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pbtns,.sbtns{display:flex;gap:5px}
.pb,.sb{flex:1;padding:6px 2px;border-radius:5px;border:1px solid var(--bd2);background:var(--s2);color:var(--t2);cursor:pointer;font-size:9px;font-weight:700}
.pb.active,.sb.active{border-color:currentColor}
.pb[data-p="low"].active{background:rgba(46,172,108,.12);color:var(--low)}
.pb[data-p="med"].active{background:rgba(252,188,0,.12);color:var(--med)}
.pb[data-p="high"].active{background:rgba(232,67,58,.12);color:var(--high)}
.sb[data-s="todo"].active{background:rgba(58,139,213,.1);color:var(--todo)}
.sb[data-s="prog"].active{background:rgba(253,81,21,.1);color:var(--prog)}
.sb[data-s="done"].active{background:rgba(46,172,108,.1);color:var(--done)}
.sb[data-s="blocked"].active{background:rgba(232,67,58,.1);color:var(--block)}
.sub-btn,.sec-btn{width:100%;padding:9px;border-radius:6px;font-weight:700;cursor:pointer}
.sub-btn{background:var(--orange);border:0;color:#fff}
.sec-btn{background:transparent;border:1px solid var(--bd2);color:var(--t2)}
.task-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.task-strip{width:3px;border-radius:2px}
.task-body{flex:1;min-width:0}
.task-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:9px;color:var(--t2);font-family:var(--mono)}
.badge{display:inline-flex;align-items:center;padding:2px 5px;border-radius:3px;font-size:8px;font-family:var(--mono);font-weight:700}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100}
.modal{width:min(520px,92vw);background:var(--sf);border:1px solid var(--bd2);border-radius:12px;padding:16px}
.modal h3{margin:0 0 12px 0;font-size:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.sync-pill{position:fixed;right:12px;bottom:10px;z-index:120;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);padding:4px 10px;border-radius:5px;font-size:10px;font-family:var(--mono)}
.projects-view{display:none;flex:1;flex-direction:column;min-height:0}
.projects-top{display:flex;gap:8px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bd2);background:var(--sf)}
.frame-wrap{flex:1;padding:14px 18px}
.project-frame{width:100%;height:100%;border:1px solid var(--bd);border-radius:10px;background:var(--sf)}
.hint{font-size:11px;color:var(--t2)}
.status-box{margin-top:8px;padding:10px;border:1px dashed var(--bd3);border-radius:8px;background:rgba(255,255,255,.02);font-size:11px;color:var(--t2);white-space:pre-wrap}
@media (max-width:980px){.monitor-view{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">MB</div>
    <div class="logo-tag">RESOURCES</div>
  </div>
  <div class="hdr-mid">
    <button class="nav-btn" id="prevM">&#8592;</button>
    <div class="month-lbl" id="monthLbl"></div>
    <button class="nav-btn" id="nextM">&#8594;</button>
  </div>
  <div class="top-filters">
    <input class="finput" id="projectFilter" list="projectFilterList" style="width:180px" placeholder="Todos los proyectos">
    <datalist id="projectFilterList"></datalist>
    <input class="finput" id="personFilter" list="personFilterList" style="width:180px" placeholder="Todas las personas">
    <datalist id="personFilterList"></datalist>
    <button class="btn btn-cyan" id="monitorBtn">Monitor</button>
    <button class="btn btn-gh" id="projectsBtn">Proyectos</button>
    <button class="btn btn-gold" id="pdfBtn">PDF</button>
  </div>
</header>

<div class="app">
  <div class="monitor-view" id="monitorView">
    <div class="cal-panel">
      <div class="cal-head">
        <div class="ch-name">Recurso</div>
        <div class="ch-load">Carga</div>
        <div class="days-wrap"><div class="days-row" id="daysHdr"></div></div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
    <div class="sidebar">
      <div class="tabs">
        <div class="tab active" data-tab="form">Nueva</div>
        <div class="tab" data-tab="tasks">Tareas</div>
        <div class="tab" data-tab="dash">Dashboard</div>
      </div>
      <div class="tab-pane active" id="tab-form">
        <div class="fsec"><label class="flbl">Recurso</label><input class="finput" id="fRes" list="resourceList" placeholder="Escribe para buscar un recurso"></div>
        <datalist id="resourceList"></datalist>
        <div class="fsec"><label class="flbl">Tarea</label><input class="finput" id="fName" placeholder="Nombre de la tarea"></div>
        <div class="grid2 fsec">
          <div><label class="flbl">Inicio</label><input class="finput" type="date" id="fStart"></div>
          <div><label class="flbl">Fin</label><input class="finput" type="date" id="fEnd"></div>
        </div>
        <div class="grid2 fsec">
          <div><label class="flbl">Horas por día</label><input class="finput" type="number" min="1" max="6" id="fHours" value="3"></div>
          <div><label class="flbl">Delivery Manager</label><input class="finput" id="fDM" placeholder="Nombre del DM"></div>
        </div>
        <div class="fsec"><label class="flbl">Proyecto</label><input class="finput" id="fProject" list="projectList" placeholder="Ej: VIDIA"></div>
        <datalist id="projectList"></datalist>
        <div class="fsec"><label class="flbl">Prioridad</label>
          <div class="pbtns">
            <button class="pb" data-p="low">Baja</button>
            <button class="pb active" data-p="med">Media</button>
            <button class="pb" data-p="high">Alta</button>
          </div>
        </div>
        <div class="fsec"><label class="flbl">Estado</label>
          <div class="sbtns">
            <button class="sb active" data-s="todo">TO DO</button>
            <button class="sb" data-s="prog">PROG</button>
            <button class="sb" data-s="done">DONE</button>
            <button class="sb" data-s="blocked">BLOCK</button>
          </div>
        </div>
        <div class="fsec"><label class="flbl">Comentario</label><textarea class="fta" id="fComment" rows="3" placeholder="Notas, dependencias, contexto..."></textarea></div>
        <button class="sub-btn" id="addTaskBtn">Agregar tarea</button>
        <button class="sec-btn" id="addResBtn">+ Agregar recurso</button>
      </div>
      <div class="tab-pane" id="tab-tasks"><div id="taskList"></div></div>
      <div class="tab-pane" id="tab-dash"><div id="dashBox"></div></div>
    </div>
  </div>

  <div class="projects-view" id="projectsView">
    <div class="projects-top">
      <select class="fsel" id="projectSelect" style="width:260px"></select>
      <button class="btn btn-or" id="openProjectBtn">Abrir</button>
      <label class="btn btn-gh" for="pdfUploadInput">Subir PDF</label>
      <input type="file" id="pdfUploadInput" accept="application/pdf" style="display:none">
      <button class="btn btn-gh" id="deleteProjectBtn">Eliminar</button>
      <div class="hint">Sube un PDF con tareas/fechas. Se intentará convertir a un Gantt guardado en esta misma sección.</div>
    </div>
    <div class="projects-top" style="border-top:1px solid var(--bd);display:block">
      <div class="status-box" id="pdfStatus">Listo para importar.</div>
    </div>
    <div class="frame-wrap">
      <iframe class="project-frame" id="projectFrame"></iframe>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModalBg">
  <div class="modal">
    <h3>Editar tarea</h3>
    <div class="grid2 fsec">
      <div><label class="flbl">Nombre</label><input class="finput" id="eName"></div>
      <div><label class="flbl">Proyecto</label><input class="finput" id="eProject"></div>
    </div>
    <div class="grid2 fsec">
      <div><label class="flbl">Inicio</label><input class="finput" type="date" id="eStart"></div>
      <div><label class="flbl">Fin</label><input class="finput" type="date" id="eEnd"></div>
    </div>
    <div class="grid2 fsec">
      <div><label class="flbl">Horas por día</label><input class="finput" type="number" id="eHours" min="1" max="6"></div>
      <div><label class="flbl">DM</label><input class="finput" id="eDM"></div>
    </div>
    <div class="fsec"><label class="flbl">Comentario</label><textarea class="fta" id="eComment" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-gh" id="deleteTaskBtn">Eliminar</button>
      <button class="btn btn-gh" id="closeEditBtn">Cancelar</button>
      <button class="btn btn-or" id="saveEditBtn">Guardar</button>
    </div>
  </div>
</div>

<div class="sync-pill" id="syncTxt">Listo</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
const COLORS={low:'#2eac6c',med:'#fcbc00',high:'#e8433a'};
const STATUS_COLORS={todo:'#3a8bd5',prog:'#fd5115',done:'#2eac6c',blocked:'#e8433a'};
const STATUS_LABEL={todo:'TO DO',prog:'EN CURSO',done:'DONE',blocked:'BLOCKED'};
const HOURS_PER_DAY=6;
const BUILTIN_PROJECTS=[{id:'vidia',title:'Banking Core EMI - VIDIA',type:'file',src:'gantt-vidia.html'}];

let now=new Date(), CY=now.getFullYear(), CM=now.getMonth();
let selPrio='med', selStat='todo', editingId=null;
let resources=loadLS('mb_resources',[
  {id:'r1',name:'Luis Miguel Perez Herrera',role:'Equipo Midas',color:'#fd5115'},
  {id:'r2',name:'Jose Luis Jarquin',role:'Equipo Midas',color:'#f44336'},
  {id:'r3',name:'Anthony Manuel',role:'Equipo Midas',color:'#5e72e4'},
  {id:'r4',name:'Angela Charris',role:'Equipo Midas',color:'#ec4899'},
  {id:'r5',name:'Kevin Sieder Diaz',role:'Equipo Midas',color:'#06b6d4'}
]);
let tasks=loadLS('mb_tasks',[]);
let generatedProjects=loadLS('mb_generated_projects',[]);

function loadLS(key,fallback){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback}catch(e){return fallback}}
function saveLS(key,val){localStorage.setItem(key,JSON.stringify(val))}
function initials(name){return name.split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function pad(n){return String(n).padStart(2,'0')}
function dateStr(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function parseDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function formatShort(s){const d=parseDate(s);return pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function fmtPct(x){return Math.round(x)+'%'}
function setSync(t){document.getElementById('syncTxt').textContent=t}
function saveAll(){saveLS('mb_resources',resources);saveLS('mb_tasks',tasks);saveLS('mb_generated_projects',generatedProjects);setSync('Guardado')}
function isToday(y,m,d){return y===now.getFullYear()&&m===now.getMonth()&&d===now.getDate()}
function isWeekend(y,m,d){const w=new Date(y,m,d).getDay();return w===0||w===6}
function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/86400000)+1}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function sortResources(){resources.sort((a,b)=>a.name.localeCompare(b.name))}
function findResourceByInput(value){
  const v=(value||'').trim().toLowerCase();
  if(!v) return null;
  return resources.find(r=>r.name.toLowerCase()===v) || resources.find(r=>r.name.toLowerCase().includes(v));
}
function filteredTasks(){
  const pf=(document.getElementById('projectFilter').value||'').trim().toLowerCase();
  const person=(document.getElementById('personFilter').value||'').trim().toLowerCase();
  return tasks.filter(t=>{
    const projectOk=!pf || ((t.project||'').toLowerCase().includes(pf));
    const res=resources.find(r=>r.id===t.rid||r.fid===t.rid);
    const personOk=!person || (res && res.name.toLowerCase().includes(person));
    return projectOk && personOk;
  });
}
function getProjects(){const set=new Set(tasks.map(t=>t.project).filter(Boolean));return Array.from(set).sort((a,b)=>a.localeCompare(b))}
function monthAvail(){let count=0; for(let d=1; d<=dim(CY,CM); d++){ if(!isWeekend(CY,CM,d)) count+=HOURS_PER_DAY; } return count; }
function usedHours(rid){ let total=0; filteredTasks().filter(t=>t.rid===rid&&t.stat!=='done').forEach(t=>{ const ms=new Date(CY,CM,1), me=new Date(CY,CM+1,0); let s=parseDate(t.start), e=parseDate(t.end); if(e<ms||s>me) return; if(s<ms) s=ms; if(e>me) e=me; for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){ if(!isWeekend(d.getFullYear(),d.getMonth(),d.getDate())) total += (t.hoursPerDay||3); } }); return total; }
function dayHours(rid,dnum){ const ds=dateStr(CY,CM,dnum); return filteredTasks().filter(t=>t.rid===rid && t.start<=ds && t.end>=ds && t.stat!=='done').reduce((s,t)=>s+(t.hoursPerDay||3),0); }
function assignRows(rowTasks){
  rowTasks=rowTasks.slice().sort((a,b)=>a.start.localeCompare(b.start));
  const rows=[];
  const out={};
  rowTasks.forEach(t=>{
    const s=parseDate(t.start), e=parseDate(t.end);
    let placed=false;
    for(let i=0;i<rows.length;i++){
      if(s>rows[i]){ rows[i]=e; out[t.id]=i+1; placed=true; break; }
    }
    if(!placed){ rows.push(e); out[t.id]=rows.length; }
  });
  return out;
}
function colorOf(prio){ return COLORS[prio] || COLORS.med; }
function statusBadge(stat){
  const map={
    todo:`<span class="badge" style="background:rgba(58,139,213,.1);color:#3a8bd5;border:1px solid rgba(58,139,213,.25)">📋 TO DO</span>`,
    prog:`<span class="badge" style="background:rgba(253,81,21,.1);color:#fd5115;border:1px solid rgba(253,81,21,.25)">⚡ EN CURSO</span>`,
    done:`<span class="badge" style="background:rgba(46,172,108,.1);color:#2eac6c;border:1px solid rgba(46,172,108,.25)">✅ DONE</span>`,

function normalizeLine(s){ return s.replace(/\s+/g,' ').trim(); }
function parseDateToken(tok, defaultYear){
  if(!tok) return null;
  tok = tok.replace(/[^\d\/\-]/g,'');
  let p = tok.split(/[\/\-]/).map(x=>x.trim()).filter(Boolean);
  if(p.length<2) return null;
  let a=Number(p[0]), b=Number(p[1]), c=p[2]?Number(p[2]):defaultYear;
  if(c<100) c += 2000;
  let month=a, day=b;
  if(a>12 && b<=12){ day=a; month=b; }
  return `${c}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
function parsePdfTextToProject(text, fileName){
  const lines=text.split('\n').map(normalizeLine).filter(Boolean).filter(l=>l.length>2);
  const yearGuess=(text.match(/\b20\d{2}\b/)||[])[0] ? Number((text.match(/\b20\d{2}\b/)||[])[0]) : 2026;
  const titleLine=lines.find(l=>/^\d+\s+Desplegar /i.test(l)) || lines.find(l=>/Desplegar|Project|Proyecto/i.test(l)) || fileName.replace(/\.pdf$/i,'');
  const projectTitle=titleLine.replace(/^\d+\s+/,'').replace(/\s+\d+\s+days.*$/i,'').trim();
  const summaryRe=/^\d+\s+(US-\d+\s+.+?)\s+\d+\s+days?\s+\w+\s+(\d{2}\/\d{2}\/\d{2})\s+\w+\s+(\d{2}\/\d{2}\/\d{2})(?:\s+[^%]*)?\s+(\d{1,3})%?$/i;
  const childRe=/^\d+\s+(.+?)\s+\d+\s+days?\s+\w+\s+(\d{2}\/\d{2}\/\d{2})\s+\w+\s+(\d{2}\/\d{2}\/\d{2})(.*)$/i;
  const tasks=[];
  let current=null;
  const pickResources=(tail)=>{
    if(!tail) return [];
    tail=tail.replace(/\b\d+%?\s*$/,'').trim();
    tail=tail.replace(/^\s*[0-9A-Z;:+\-FS\s]+(?=[A-Za-zÁÉÍÓÚÑáéíóúñ])/,'').trim();
    if(!tail) return [];
    const chunks=tail.split(/;|,/).map(x=>x.trim()).filter(Boolean);
    return chunks.filter(x=>/[A-Za-zÁÉÍÓÚÑáéíóúñ]{3,}/.test(x)).slice(0,3);
  };
  for(const line of lines){
    let m=line.match(summaryRe);
    if(m){
      current={id:m[1].split(' ')[0], name:m[1].replace(/^US-\d+\s+/,''), pct:Number(m[4]||0), stat:Number(m[4]||0)>=100?'done':(Number(m[4]||0)>0?'prog':'todo'), start:parseDateToken(m[2],yearGuess), end:parseDateToken(m[3],yearGuess), resources:[]};
      tasks.push(current);
      continue;
    }
    m=line.match(childRe);
    if(m && current){
      const resources=pickResources(m[4]);
      resources.forEach(r=>{ if(!current.resources.includes(r)) current.resources.push(r); });
      continue;
    }
  }
  if(!tasks.length){
    // fallback more generic with any dated line
    const dateRangeRe=/(\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)\s*(?:→|->|-|a|hasta|to)\s*(\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)/i;
    let counter=1;
    for(const line of lines){
      const m2=line.match(dateRangeRe); if(!m2) continue;
      tasks.push({id:'US-'+String(counter).padStart(2,'0'), name:line.replace(dateRangeRe,'').trim().slice(0,60)||('Actividad '+counter), pct:0, stat:'todo', start:parseDateToken(m2[1],yearGuess), end:parseDateToken(m2[2],yearGuess), resources:[]});
      counter++;
    }
  }
  const rawPreview=lines.slice(0,40).join('\n');
  return {title:projectTitle.replace(/[_\-]+/g,' '), tasks:tasks.map(t=>({...t, resource:(t.resources||[]).join(' / ')})), rawPreview};
}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))}

async function extractPdfText(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let allLines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p); const content=await page.getTextContent();
    const groups={};
    content.items.forEach(it=>{
      const y=Math.round(it.transform[5]); groups[y]=groups[y]||[]; groups[y].push({x:it.transform[4],str:it.str});
    });
    const lines=Object.keys(groups).sort((a,b)=>b-a).map(y=>groups[y].sort((a,b)=>a.x-b.x).map(x=>x.str).join(' '));
    allLines.push(...lines);
  }
  return allLines.join('\n');
}
async function handlePdfUpload(file){
  try{
    pdfStatus.textContent='Procesando PDF: '+file.name+'...';
    const text=await extractPdfText(file);
    const project=parsePdfTextToProject(text,file.name);
    const html=generateProjectHtml(project);
    const rec={id:'gen_'+Date.now(),title:project.title,type:'generated',html,sourceName:file.name,taskCount:project.tasks.length};
    generatedProjects.push(rec); saveAll(); renderProjectsSelect(); projectSelect.value=rec.id; openSelectedProject(false);
    pdfStatus.textContent=`Proyecto creado: ${project.title}\nTareas detectadas: ${project.tasks.length}\n\nVista previa del texto leído:\n${project.rawPreview.slice(0,1200)}`;
  }catch(err){
    console.error(err); pdfStatus.textContent='No se pudo procesar el PDF.\n'+err.message;
  }
}
